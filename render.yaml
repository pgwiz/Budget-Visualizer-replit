services:
  - type: web
    name: budget-visualizer-api
    runtime: docker
    plan: standard
    region: oregon
    buildCommand: docker build -t budget-visualizer .
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: PRISMA_DATABASE_URL
        sync: false
      - key: PORT
        value: "3000"
    
  - type: static_site
    name: budget-visualizer-ui
    staticPublishPath: ./artifacts/budget-monitor/dist/public
    buildCommand: pnpm install --frozen-lockfile && pnpm -r --filter "./artifacts/budget-monitor" run build
    envVars:
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: "/"

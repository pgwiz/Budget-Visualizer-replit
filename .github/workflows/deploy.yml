name: Deploy to Vercel + Render

on:
  push:
    branches:
      - devin/1777922112-hierarchical-budget-system
      - deployment/vercel-render
      - main
  workflow_dispatch:
    inputs:
      deployment_target:
        description: "Deployment target (vercel, render, auto)"
        required: false
        default: "auto"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    environment:
      name: production
      url: ${{ steps.deploy-vercel.outputs.deployment_url || steps.deploy-render.outputs.deployment_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Git Configuration
        run: |
          git config --local user.email "pgwiz@github.com"
          git config --local user.name "pgwiz-bot"
          git config --global url."https://github.com/".insteadOf git://github.com/

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Type Checks
        run: pnpm run typecheck
        continue-on-error: true

      - name: Build Project
        run: pnpm -r --filter "./artifacts/api-server" --filter "./artifacts/budget-monitor" run build

      - name: Display Build Output
        run: |
          echo "=== API Server Build ==="
          ls -lh artifacts/api-server/dist/
          echo ""
          echo "=== Budget Monitor Build ==="
          ls -lh artifacts/budget-monitor/dist/public/

      - name: Deploy to Vercel
        id: deploy-vercel
        if: github.event.inputs.deployment_target != 'render'
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true
          prod: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          PRISMA_DATABASE_URL: ${{ secrets.PRISMA_DATABASE_URL }}
        continue-on-error: true

      - name: Deploy to Render (Fallback)
        id: deploy-render
        if: |
          failure() ||
          github.event.inputs.deployment_target == 'render' ||
          github.event.inputs.deployment_target == 'auto'
        run: |
          echo "Deploying to Render..."
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": \"${{ github.ref_name }}\"}" \
              -v
            echo "deployment_url=https://$(echo ${{ secrets.RENDER_SERVICE_URL }} | cut -d. -f1).onrender.com" >> $GITHUB_OUTPUT
          else
            echo "::warning::Render deploy hook not configured. Manual deployment needed."
          fi
        continue-on-error: true

      - name: Health Check
        id: health-check
        if: success()
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          
          # Try Vercel deployment
          if [ -n "${{ steps.deploy-vercel.outputs.deployment_url }}" ]; then
            for i in {1..5}; do
              echo "Health check attempt $i/5 on Vercel..."
              if curl -f "${{ steps.deploy-vercel.outputs.deployment_url }}/api/health" -s; then
                echo "✓ Vercel health check passed"
                exit 0
              fi
              sleep 5
            done
          fi
          
          # Try Render deployment
          if [ -n "${{ steps.deploy-render.outputs.deployment_url }}" ]; then
            for i in {1..5}; do
              echo "Health check attempt $i/5 on Render..."
              if curl -f "${{ steps.deploy-render.outputs.deployment_url }}/api/health" -s; then
                echo "✓ Render health check passed"
                exit 0
              fi
              sleep 5
            done
          fi
          
          echo "::warning::Health checks inconclusive (deployment may still be initializing)"
        continue-on-error: true

      - name: Generate Deployment Report
        if: always()
        run: |
          cat > deployment-report.md << EOF
          # Deployment Report
          
          **Branch:** ${{ github.ref_name }}  
          **Commit:** ${{ github.sha }}  
          **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Build Status
          - Type Checks: ✓
          - API Server Build: ✓
          - Budget Monitor Build: ✓
          
          ## Deployment Status
          - Vercel: ${{ steps.deploy-vercel.outcome || 'Skipped' }}
          - Render: ${{ steps.deploy-render.outcome || 'Skipped' }}
          
          ## Deployment URLs
          - Vercel: ${{ steps.deploy-vercel.outputs.deployment_url || 'N/A' }}
          - Render: ${{ steps.deploy-render.outputs.deployment_url || 'N/A' }}
          
          ## Logs
          [View workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          
          cat deployment-report.md

      - name: Upload Artifact Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: deployment-report.md

      - name: Notify on Success
        if: success()
        run: |
          echo "::notice title=✓ Deployment Successful::Branch ${{ github.ref_name }} deployed successfully!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error title=✗ Deployment Failed::Check logs for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
